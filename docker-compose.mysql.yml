# ============================================================
# MiniAppLogs – MySQL
# ============================================================
# Usage:
#   1. Copy .env.mysql.example to .env
#   2. Fill in DB_PASSWORD and DB_ROOT_PASSWORD
#   3. Set APP_URL to your server IP/domain
#   4. Run: docker compose -f docker-compose.mysql.yml up -d
# ============================================================

services:
  app:
    image: trannguyenhan/miniapplogs:latest
    container_name: miniapplogs_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_LOCALE: ${APP_LOCALE:-en}
      # Switch to MySQL
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: miniapplogs
      DB_USERNAME: miniapplogs
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: mysql:8.0
    container_name: miniapplogs_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: miniapplogs
      MYSQL_USER: miniapplogs
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  app_storage:
  db_data:
